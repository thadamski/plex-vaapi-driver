name: Build and publish

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/build.yml
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version tags from Dockerfile
        id: tags
        run: |
          IHD=$(grep '^ARG IHD_TAG=' Dockerfile | cut -d= -f2)
          GMM=$(grep '^ARG GMM_TAG=' Dockerfile | cut -d= -f2)
          echo "label=${IHD}_${GMM}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/thadamski/plex-vaapi-driver:latest
            ghcr.io/thadamski/plex-vaapi-driver:${{ steps.tags.outputs.label }}
          labels: |
            org.opencontainers.image.source=https://github.com/thadamski/plex-vaapi-driver
            org.opencontainers.image.description=RELR-free iHD VA-API driver for Plex on Arrow Lake
          cache-from: type=gha
          cache-to: type=gha,mode=max
